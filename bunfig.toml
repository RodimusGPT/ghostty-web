# Bun Configuration
# https://bun.sh/docs/runtime/bunfig

[test]
# Preload Happy DOM before running tests to provide browser-like globals
# (window, document, HTMLElement, etc.)
preload = "./happydom.ts"
# Exclude Playwright e2e tests (they use @playwright/test, not bun:test)
exclude = ["**/e2e/**"]
